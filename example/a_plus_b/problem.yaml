name: a_plus_b
time_limit_secs: 3.0
memory_limit_mb: 512.0
cpp_compile_args: [-O2, -std=c++20]
programs:
  gen: ./src/gen.cpp
  std:
    info: !cpp
      path: ./src/std.cpp
    time_limit_secs: 1.0
  val: ./src/val.cpp
solution: std
validator: val
generator: gen
test:
  type: min
  bundles:
    sample:
      - [20]
    main:
      - [10]
      - [10000000]
      - [1000000000]
  tasks:
  - name: sample
    score: 1.0
    bundles: [sample]
  - name: main
    score: 99.0
    bundles: [main]
    dependencies: [sample]
