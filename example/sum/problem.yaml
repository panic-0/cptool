name: sum
programs:
  gen:
    info: !cpp
      path: ./src/gen.cpp
      compile_args: [-O2, -std=c++14, -I../assets/testlib/]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
  std:
    info: !cpp
      path: ./src/std.cpp
      compile_args: [-O2, -std=c++14]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
  val:
    info: !cpp
      path: ./src/val.cpp
      # testlib validators are compile-heavy; O0 keeps smoke/CI cold builds fast.
      compile_args: [-O0, -I../assets/testlib/]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
  chk:
    info: !cpp
      path: ../assets/testlib/checkers/lcmp.cpp
      compile_args: [-O2, -I../assets/testlib/]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
solution: std
validator: val
checker: chk
generator: gen
test:
  # The top-level generator is the default for all bundles and stress plans.
  # Task type defaults can be declared globally for all tasks.
  type: min
  bundles:
    s1:
      cases:
      # Args-only shorthand; uses the top-level generator.
      - [998, 10]
      # Args-only mapping; also uses the top-level generator.
      - args: [999, 1000000000]
      - [1000, 1000000000]
    s2:
      cases:
      # Args-only shorthand; uses the top-level generator.
      - [49998, 10]
      - [49999, 1000000000]
      - [50000, 1000000000]
    s3:
      cases:
      # Prefer args-only cases when the top-level generator is used.
      - [199998, 10]
      - [199999, 1000000000]
      - [200000, 1000000000]
  tasks:
  # Omitting type uses test.type.
  - name: s1
    score: 10.0
    bundles: [s1]
  - name: s2
    score: 30.0
    bundles: [s2]
    dependencies: [s1]
  # Explicit task type remains valid when a task needs its own behavior.
  - name: s3
    score: 60.0
    type: min
    bundles: [s3]
    dependencies: [s1, s2]
