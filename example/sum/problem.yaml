name: sum
time_limit_secs: 1.0
memory_limit_mb: 512.0
cpp_compile_args: [-O2, -std=c++20]
programs:
  gen: ./src/gen.cpp
  std: ./src/std.cpp
  brute: ./src/brute.cpp
  wrong: ./src/wrong.cpp
  val:
    info: !cpp
      path: ./src/val.cpp
      # testlib validators are compile-heavy; O0 keeps smoke/CI cold builds fast.
      compile_args: [-O0, -std=c++20]
  chk: ./src/chk.cpp
solution: std
validator: val
checker: chk
generator: gen
test:
  # 顶层 generator 是所有 bundle 的默认生成器。
  # task 的 type 可以在 test.type 统一声明。
  type: min
  bundles:
    sample:
      cases:
      # 手写样例放在 fixtures/input，再通过 :file 进入正式数据。
      - {generator: ":file", args: [fixtures/input/sample.in]}
    corner:
      cases:
      # 覆盖模数边界和 a_i 在模意义下等于 1 的特殊分母。
      - {generator: ":file", args: [fixtures/input/edge_mod.in]}
      - {generator: ":file", args: [fixtures/input/one_mod.in]}
    s1:
      # args-only 简写，参数为 max_n, max_k, max_a, min_k。
      - [20, 20, 1000, 1]
      # args-only case 同样使用顶层 generator。
      - [100, 100, 1000000, 1]
      - [1000, 1000, 1000000000, 1]
    s2:
      - [5000, 100000, 1000000000, 1]
      - [20000, 1000, 1000000000, 1]
      - [50000, 100000, 1000000000, 1]
    s3:
      # 接近约束上限的数据。
      - [100000, 1, 1000000000, 1]
      - [100000, 100000, 1000000000, 1]
  tasks:
  - name: sample
    score: 0.0
    bundles: [sample]
  # 省略 type 时使用 test.type。
  - name: s1
    score: 10.0
    bundles: [s1, corner]
    dependencies: [sample]
  - name: s2
    score: 30.0
    bundles: [s2]
    dependencies: [sample, s1]
  # 单个 task 仍然可以显式写 type。
  - name: s3
    score: 60.0
    type: min
    bundles: [s3]
    dependencies: [sample, s1, s2]
  - name: std-vs-brute-small
    # verify-only inline cases：不会落盘进正式数据。
    cases:
    - [20, 30, 1000, 1, 1..5]
    pass: [brute]
  - name: catches-first-power-only
    cases:
    - [10, 8, 1000000000, 2, 1..3]
    fail: [wrong]
