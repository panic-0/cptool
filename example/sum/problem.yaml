name: sum
programs:
  gen:
    info: !cpp
      path: ./src/gen.cpp
      compile_args: [-O2, -std=c++14, -I../assets/testlib/]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
  std:
    info: !cpp
      path: ./src/std.cpp
      compile_args: [-O2, -std=c++14]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
  val:
    info: !cpp
      path: ./src/val.cpp
      # testlib validators are compile-heavy; O0 keeps smoke/CI cold builds fast.
      compile_args: [-O0, -I../assets/testlib/]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
  chk:
    info: !cpp
      path: ../assets/testlib/checkers/lcmp.cpp
      compile_args: [-O2, -I../assets/testlib/]
    time_limit_secs: 5.0
    memory_limit_mb: 512.0
solution: std
validator: val
checker: chk
test:
  # Generator defaults can be declared globally for all bundles.
  generator: gen
  # Task type defaults can be declared globally for all tasks.
  type: min
  bundles:
    s1:
      cases:
      # Args-only shorthand; uses test.generator.
      - [998, 10]
      # Args-only mapping; also uses test.generator.
      - args: [999, 1000000000]
      # Full case form; use this escape hatch when a case needs its own generator.
      - generator: gen
        args: [1000, 1000000000]
    s2:
      # Bundle defaults override test.generator for this bundle.
      generator: gen
      cases:
      # Args-only shorthand; uses this bundle's generator.
      - [49998, 10]
      - [49999, 1000000000]
      - [50000, 1000000000]
    s3:
      cases:
      # Full case form remains valid and is the most explicit spelling.
      - generator: gen
        args: [199998, 10]
      - generator: gen
        args: [199999, 1000000000]
      - generator: gen
        args: [200000, 1000000000]
  tasks:
  # Omitting type uses test.type.
  - name: s1
    score: 10.0
    bundles: [s1]
  - name: s2
    score: 30.0
    bundles: [s2]
    dependencies: [s1]
  # Explicit task type remains valid when a task needs its own behavior.
  - name: s3
    score: 60.0
    type: min
    bundles: [s3]
    dependencies: [s1, s2]
